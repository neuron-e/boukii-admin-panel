<div class="stepper" *ngIf="stepperForm">
  <!-- Paso 1 -->
  <div *ngIf="currentStep === 0">
    <booking-step-one [initialData]="stepperForm.get('step1')?.value" [allLevels]="allLevels" [lockClient]="lockClient"
      (stepCompleted)="handleStepCompletion(1, $event)">
    </booking-step-one>
  </div>

  <div *ngIf="currentStep === 1">
    <booking-step-two [initialData]="stepperForm.get('step2')?.value"
      [client]="stepperForm.get('step1')?.value?.mainClient" [allLevels]="allLevels"
      (stepCompleted)="handleStepCompletion(2, $event)" (prevStep)="previousStep()">
    </booking-step-two>
  </div>

  <div *ngIf="currentStep === 2">
    <booking-step-three [initialData]="stepperForm.get('step3')?.value"
      [utilizers]="stepperForm.get('step2')?.value?.utilizers" (stepCompleted)="handleStepCompletion(3, $event)"
      (prevStep)="previousStep()">
    </booking-step-three>
  </div>

  <div *ngIf="currentStep === 3">
    <booking-step-four [initialData]="stepperForm.get('step4')?.value"
      [client]="stepperForm.get('step1')?.value?.mainClient" [sportLevel]="stepperForm.get('step3')?.value?.sportLevel"
      [utilizers]="stepperForm.get('step2')?.value?.utilizers" [activitiesBooked]="activitiesBooked"
      [selectedForm]="selectedForm" (stepCompleted)="handleStepCompletion(4, $event)" (prevStep)="previousStep()">
    </booking-step-four>
  </div>

  <ng-container *ngIf="currentStep === 4">
    <booking-step-details [initialData]="stepperForm.get('step5')?.value"
      [course]="stepperForm.get('step4')?.value?.course" [date]="stepperForm.get('step4')?.value?.date"
      [sportLevel]="stepperForm.get('step3')?.value?.sportLevel"
      [utilizers]="stepperForm.get('step2')?.value?.utilizers" [activitiesBooked]="activitiesBooked"
      [selectedForm]="selectedDates" (stepCompleted)="handleStepCompletion(5, $event)" (prevStep)="previousStep()">
    </booking-step-details>
  </ng-container>

  <ng-container *ngIf="currentStep === 5">
    <ng-container *ngIf="rentalStepEnabled; else observationsWithoutRental">
      <mat-card-content class="cardWrapper">
        <booking-rental-inline
          [client]="rentalClient"
          [bookingDates]="rentalBookingDates"
          [initialDraft]="rentalInitialDraft"
          (draftChange)="rentalDraftChange.emit($event)"
          (summaryChange)="rentalSummaryChange.emit($event)">
        </booking-rental-inline>

        <div class="stepButtonsWrapper">
          <app-form-button (click)="previousStep()" form="back" name="back" icon="mat:arrow_back"></app-form-button>
          <app-form-button (click)="handleRentalStepCompletion()" form="flat" name="continue"></app-form-button>
        </div>
      </mat-card-content>
    </ng-container>
    <ng-template #observationsWithoutRental>
      <booking-step-observations [initialData]="stepperForm.get('step6')?.value"
        (stepCompleted)="handleStepCompletion(6, $event)"
        (saveAndCreateNew)="handleSaveAndCreateNew($event)"
        (prevStep)="previousStep()">
      </booking-step-observations>
    </ng-template>
  </ng-container>

  <ng-container *ngIf="currentStep === 6 && rentalStepEnabled">
    <booking-step-observations [initialData]="stepperForm.get('step7')?.value"
      (stepCompleted)="handleStepCompletion(7, $event)"
      (saveAndCreateNew)="handleSaveAndCreateNew($event)"
      (prevStep)="previousStep()">
    </booking-step-observations>
  </ng-container>
</div>
